<main class="page">
  <section class="hero" *ngIf="!hasSearched && !(loading$ | async)">
    <p class="eyebrow">Metropolitan Museum of Art</p>
    <h1 class="hero-title">
      Wander through five<br>
      millennia of <em>art.</em>
    </h1>
    <p class="hero-lead">
      Search the Met's open collection of more than 500,000 works &mdash;
      from ancient sculpture to post-war painting &mdash; and dive into any piece.
    </p>
    <div class="chips">
      <span class="chip-label">Try</span>
      <button *ngFor="let s of suggestions" class="chip" (click)="runSuggestion(s)">
        {{ s.label }}
      </button>
    </div>
  </section>

  <app-result></app-result>
</main>
